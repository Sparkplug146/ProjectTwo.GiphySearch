<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIPHY.SearchEngine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>GIPHY Search Engine</h1>

      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Trending</a></li>
          <li><a href="#">About</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="intro">
        <p>
          Welcome to the GIPHY Search Engine! Use the search bar below to 
          find a GIF you have in mind!
        </p>
      </section>
      <form id="search-form">
        <input
          type="search"
          id="search-input"
          placeholder="Search for GIFs..."
          required
        />
        <button type="submit">Search</button>
      </form>
      <div id="results" class="row"></div>
    </main>
    <script src="main.js"></script>
  </body>
</html>
